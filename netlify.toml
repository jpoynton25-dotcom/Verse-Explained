[[redirects]]
  from = "https://www.verseexplained.com/*"
  to = "https://verseexplained.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Content-Type = "application/xml; charset=utf-8"
